<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ page.title }} | UTech Jamaica Student FAQs</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Styles -->
  style.css

  <!-- Theme handling -->
  <script src="{{ '/theme.js' | relative_url }}" defer></script>

  <!-- Search -->
  <script src="{{ '/search.js' | relative_url }}" defer></script>
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  <header class="site-header">
    <h1>UTech Jamaica – Student FAQs</h1>

    <div class="search-wrapper" role="search">
      <label for="searchInput" class="visually-hidden">Search FAQs</label>
      <input
        type="search"
        id="searchInput"
        placeholder="Search all FAQs…"
        aria-describedby="searchHelp"
        autocomplete="off"
      />
      <span id="searchHelp" class="visually-hidden">
        Results update as you type
      </span>
    </div>

    <button
      id="themeToggle"
      aria-label="Toggle light and dark theme"
      aria-pressed="false"
    >
      🌓
    </button>
  </header>

  <section
    class="search-results"
    aria-live="polite"
    aria-atomic="true"
  >
    <ul id="searchResults"></ul>
    <p id="noResults" hidden>No results found.</p>
  </section>

  <main id="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>© University of Technology, Jamaica — Student FAQs</p>
  </footer>
</body>
</html>
